services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: wcm-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -t '$$SYS/broker/uptime' -C 1 -W 3 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  simulator:
    build: ./sensor_simulator
    container_name: wcm-simulator
    depends_on:
      mosquitto:
        condition: service_started
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: wcm-backend
    depends_on:
      mosquitto:
        condition: service_started
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      DB_PATH: /data/warehouse.db
    volumes:
      - backend_data:/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      args:
        # Reached from the browser, so this is the host's loopback - not the container hostname
        VITE_API_BASE: http://localhost:8000
    container_name: wcm-dashboard
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  backend_data:
